<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <h1>Форма</h1>

        <button id="themeButton">Ночной режим</button>

        <form id="myForm">
            <label>
                Фамилия
                <input type="text" id="surname">
            </label>

            <label>
                Имя
                <input type="text" id="name">
            </label>

            <label>
                Электронная почта
                <input type="email" id="email">
            </label>

            <label>
                Телефон
                <input type="tel" id="phone">
            </label>

            <button type="submit">Отправить</button>
        </form>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
